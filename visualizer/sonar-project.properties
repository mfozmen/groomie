# SonarQube Cloud config for the visualizer companion app. The Groomie plugin itself is
# prompt-only markdown and has no code to analyse — so the whole Sonar project is scoped to
# visualizer/ (the CI scan sets projectBaseDir: visualizer, which is why these paths are
# relative to visualizer/, matching the lcov report vitest emits).
sonar.organization=mfozmen
sonar.projectKey=mfozmen_groomie
sonar.projectName=groomie

sonar.sources=src,scripts
sonar.tests=src,scripts
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Coverage imported from vitest's lcov report (npm run test:coverage).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Only the bootstrap entry and the type-only module are out of the COVERAGE metric — everything
# else (dot builder, details panel, app wiring, emit) is unit-tested. Kept in sync with vitest.config.ts.
sonar.coverage.exclusions=src/main.ts,src/types.ts

# build-plugin-template.mjs is dev build tooling (shells out to `vite build` and writes the two
# shipped template assets) — not runtime code and never run against untrusted input. Excluded from
# analysis like any build script: its `execSync('vite build')` is not a real PATH vulnerability, and
# its output contract is covered by plugin-template.test.ts. Kept in sync with vitest.config.ts.
sonar.exclusions=dist/**,public/**,scripts/build-plugin-template.mjs
