name: Claude AI Review

# Advisory AI code review using anthropics/claude-code-action@v1.
#
# Auth: the Claude SUBSCRIPTION via claude_code_oauth_token — NOT an API key.
# Generate the token locally with `claude setup-token`, then add it as the
# CLAUDE_CODE_OAUTH_TOKEN repository secret. No Anthropic API key lives in this
# repo, so reviews draw from the subscription quota.

on:
  # Review on open/reopen/ready AND on every push (`synchronize`) so the review
  # re-runs per push and stays current with the PR head.
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  # On-demand re-review by commenting @claude on the PR.
  issue_comment:
    types: [created]

# Cancel an in-flight review for the same PR when a newer trigger arrives.
concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Fork safety: use `pull_request` (never `pull_request_target`) and only run
    # when the PR head repo is THIS repo, so the subscription token is never
    # exposed to forked PRs. For comment-triggered runs, require an actual PR
    # comment containing @claude from a collaborator-and-above.
    if: >
      ( github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository ) ||
      ( github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write
      # claude-code-action authenticates via OIDC and needs this.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          # Subscription auth — do NOT add an Anthropic API key here.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # allowedTools is what lets the reviewer actually POST its findings:
          # the inline-comment tool, plus gh for reading the diff and leaving a
          # top-level summary. Without these the agent analyzes but has no
          # permitted tool to publish (silent no-op).
          claude_args: |
            --max-turns 40
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          prompt: |
            You are reviewing this pull request as an ADVISORY reviewer for
            Groomie — an open-source Claude Code plugin (a `/groomie` skill) that
            grooms messy Jira issues into epic / user-story / technical-task
            breakdowns. Do NOT approve or block the PR — leave the verdict to the
            human.

            How to publish your review:
            - Use `mcp__github_inline_comment__create_inline_comment` for concrete
              findings on specific changed lines.
            - Use `gh pr comment` for ONE concise top-level summary. ALWAYS post
              it, even if nothing is notable (say so briefly), so the run leaves a
              visible result.

            This repo is mostly a Claude Code skill: markdown prompt files under
            `skills/`, a plugin manifest under `.claude-plugin/`, and release
            tooling. Review for:
            - Skill quality: is SKILL.md clear, unambiguous, and does its flow
              actually achieve the grooming outcome? Are the reference guides
              consistent with it? Any instruction that would mislead the agent?
            - Correctness of any deterministic code/scripts, with tests that
              assert real behavior (TDD) — but only where such code exists; do not
              demand tests for pure prompt/markdown changes.
            - Open-source hygiene: NO hard dependency on company-specific tooling
              (e.g. a private knowledge base) — only Jira/Atlassian MCP may be a
              hard dependency; everything else must degrade gracefully.
            - Conventions: English-only in code and docs; Conventional Commits;
              plugin.json / package.json versions kept in sync.

            Group findings by severity (Critical / Warning / Suggestion), be
            concise and specific, cite file and line. Don't nitpick style.

            Spend turns economically: fetch the diff once with `gh pr diff` and
            don't re-fetch; leave inline comments only for the most important
            issues; post the single summary comment last so it always lands.
